<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Claudia — Gateway metrics</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0.75rem 1rem; background: #fafafa; color: #1a1a1a; box-sizing: border-box; }
    h1 { font-size: 1.1rem; margin: 0 0 0.5rem 0; }
    #toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    #toolbar .hint { font-size: 0.8rem; color: #555; max-width: 42rem; }
    #toolbar a { color: #0b57d0; }
    button {
      font: inherit; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid #ccc;
      background: #fff; cursor: pointer;
    }
    button:hover { background: #f0f0f0; }
    #status { font-size: 0.85rem; color: #555; }
    #status.err { color: #a40000; }
    section { margin-bottom: 1.25rem; }
    section h2 { font-size: 0.95rem; margin: 0 0 0.35rem 0; color: #333; }
    table { width: 100%; max-width: 64rem; border-collapse: collapse; font-size: 0.82rem; background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    th, td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #eee; }
    th { background: #f4f4f4; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    code { font-size: 0.78rem; background: #f0f0f0; padding: 0.1em 0.35em; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Gateway metrics</h1>
  <div id="toolbar">
    <button type="button" id="btn-refresh">Refresh</button>
    <span id="status">Loading…</span>
    <span id="toolbar-extra" class="hint"></span>
  </div>

  <section>
    <h2>Current UTC minute (<span id="lbl-minute"></span>)</h2>
    <div id="tbl-minute"></div>
  </section>
  <section>
    <h2>Current UTC day (<span id="lbl-day"></span>)</h2>
    <div id="tbl-day"></div>
  </section>
  <section>
    <h2>Recent upstream calls</h2>
    <div id="tbl-events"></div>
  </section>

  <script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var embedded = params.get("embed") === "1" || window.self !== window.top;
  var extra = document.getElementById("toolbar-extra");
  if (embedded) {
    extra.textContent = "Embedded — use Gateway · Admin · Metrics in the bar above the logs view (desktop shell).";
  } else {
    extra.innerHTML = '<a href="/ui/logs">Logs</a> · <a href="/ui/desktop">Desktop shell</a> · <a href="/ui/logs?focus=admin">Admin</a>';
  }

  var statusEl = document.getElementById("status");
  var pollTimer = null;

  function esc(s) {
    if (s == null) return "";
    var d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  function rollupTable(rows) {
    if (!rows || !rows.length) {
      return "<p class=\"hint\">No rows for this window yet.</p>";
    }
    var h = "<table><thead><tr><th>Provider</th><th>Model</th><th>HTTP</th><th class=\"num\">Calls</th><th class=\"num\">Est. tokens</th></tr></thead><tbody>";
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      h += "<tr><td>" + esc(r.provider) + "</td><td><code>" + esc(r.model_id) + "</code></td><td>" + esc(r.status) +
        "</td><td class=\"num\">" + esc(r.calls) + "</td><td class=\"num\">" + esc(r.est_tokens) + "</td></tr>";
    }
    h += "</tbody></table>";
    return h;
  }

  function eventsTable(rows) {
    if (!rows || !rows.length) {
      return "<p class=\"hint\">No events recorded yet.</p>";
    }
    var h = "<table><thead><tr><th>Time (UTC)</th><th>Provider</th><th>Model</th><th>HTTP</th><th class=\"num\">Est. tokens</th></tr></thead><tbody>";
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      h += "<tr><td>" + esc(r.occurred_at) + "</td><td>" + esc(r.provider) + "</td><td><code>" + esc(r.model_id) +
        "</code></td><td>" + esc(r.status) + "</td><td class=\"num\">" + esc(r.est_tokens) + "</td></tr>";
    }
    h += "</tbody></table>";
    return h;
  }

  function load() {
    fetch("/api/ui/metrics?limit=150", { credentials: "same-origin" })
      .then(function (res) {
        if (res.status === 401) {
          window.location.href = "/ui/login?next=" + encodeURIComponent("/ui/metrics");
          return null;
        }
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (data) {
        if (!data) return;
        statusEl.className = "";
        if (!data.metrics_store_open) {
          statusEl.textContent = "Store closed — " + (data.message || "see sqlite_path in config.");
          statusEl.className = "err";
        } else {
          statusEl.textContent = "Updated " + (data.now_utc || "") + " · SQLite: " + (data.sqlite_path || "");
        }
        document.getElementById("lbl-minute").textContent = data.current_minute_utc || "";
        document.getElementById("lbl-day").textContent = data.current_day_utc || "";
        document.getElementById("tbl-minute").innerHTML = rollupTable(data.minute_rollups);
        document.getElementById("tbl-day").innerHTML = rollupTable(data.day_rollups);
        document.getElementById("tbl-events").innerHTML = eventsTable(data.recent_events);
      })
      .catch(function (e) {
        statusEl.textContent = "Error: " + (e && e.message ? e.message : String(e));
        statusEl.className = "err";
      });
  }

  document.getElementById("btn-refresh").addEventListener("click", load);
  load();
  pollTimer = setInterval(load, 12000);
  window.addEventListener("beforeunload", function () {
    if (pollTimer) clearInterval(pollTimer);
  });
})();
  </script>
</body>
</html>
