  - slug: rag.retrieve.error
    formatter: rag_retrieve_error
    gallery_preview: RAG retrieval failed; continuing without injected chunks.
  - slug: conversation.errored
    formatter: conversation_errored
    gallery_preview: This conversation turn ended with an error (no successful completion delivered).
  - slug: conversation.delivered
