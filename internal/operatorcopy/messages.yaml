version: 1
locale: en
formatters:
  broker_bootstrap_complete:
    description: bootstrap_ms suffix
  broker_catalog_sync:
    description: catalog_model_count / pricing detail
  broker_chat_relay:
    description: chat.chimera-broker request/response/error
  broker_jwt_startup:
    description: JWT/API key/disabled from progress_detail
  broker_log_retention:
    description: log_retention_days or detail
  broker_plugin_status:
    description: plugin_name + plugin_status
  broker_progress_detail:
    description: Trim progress_detail for broker slugs
  broker_provider_id:
    description: provider_id suffix
  broker_provider_limits:
    description: chat.provider_limits.blocked reason
  broker_ready:
    description: listen_url or listen_port
  broker_routing_relay:
    description: chat.routing.* relay lines
  broker_trim_detail:
    description: chimeraBrokerTrimDetail helper
  broker_version:
    description: chimera_broker_version
  conversation_broker_started:
    description: upstreamModel for broker POST
  conversation_delivered:
    description: HTTP status + total_ms tail
  conversation_errored:
    description: HTTP status + gateway lifecycle error hint
  conversation_routing:
    description: upstreamModel, attempt/chainLen
  gateway_auth_reloaded:
    description: Optional Active keys count suffix
  gateway_health_upstream:
    description: ok, status, detail, target host
  gateway_startup_config_resolved:
    description: filePath, api_keys_path, routingPolicyPath
  gateway_startup_disk_log:
    description: phase mkdir/open vs enabled path
  gateway_startup_listening:
    description: addr, broker host
  gateway_supervisor_bin_cfg:
    description: bin leaf + config path truncation
  gateway_supervisor_broker_start:
    description: bin, app_dir, host, port
  gateway_supervisor_url_tail:
    description: health-check URL host/path tail
  gateway_supervisor_vectorstore_start:
    description: bin, storage, http/grpc ports
  http_access:
    description: method path status responseTimeMs (summarized primary column)
  http_broker_inbound:
    description: Broker HTTP access / rate limit line
  indexer_discovery:
    description: discovery summary fields
  indexer_fanout:
    description: fanout enqueue/remainder
  indexer_gateway_config:
    description: chunk_size, embedding_model tail
  indexer_job_failed:
    description: shortIngestFailureDetail tail
  indexer_job_ingested:
    description: rel, chunks
  indexer_job_skipped:
    description: rel, skip_reason
  indexer_job_upload:
    description: rel, bytes, transport
  indexer_queue_snapshot:
    description: queue_depth, ingest_completed
  indexer_rag_source:
    description: rag.retrieve.source hits + rel
  indexer_retry_recovery:
    description: retry/recovery/pause lines
  indexer_run_done:
    description: mode, ingest_completed, failures
  indexer_run_start:
    description: roots count and root_ids
  indexer_scope_active_file:
    description: project + rel
  indexer_scope_status:
    description: workspace/queue counts
  indexer_state:
    description: state label, queue_depth, ingest_inflight
  indexer_storage_stats:
    description: qdrant_points or unavailable detail
  indexer_work_failed:
    description: work kind label
  ingest_complete:
    description: chunks, source, tenant
  rag_collection:
    description: Append RAG collection label from flat.collection
  rag_retrieve_error:
    description: Summarize rag.retrieve.error err field
  upstream_models_ok:
    description: Optional count suffix
  vectorstore_collection_http:
    description: collection display + optional http status
  vectorstore_listen_ports:
    description: REST/gRPC port suffix
  vectorstore_progress_detail:
    description: progress_detail truncation
  vectorstore_version:
    description: qdrant_version in banner
messages:
  - slug: gateway.http.access
    formatter: http_access
    aliases:
      - http response
    gallery_preview: GET /v1/chat/completions → 200 · 142 ms
  - slug: conversation.merge.embed_failed
    summary: Embedding failed so this turn cannot be associated with any current conversation; storing as a new conversation
    gallery_preview: Embedding failed — storing as a new conversation
  - slug: rag.query
    formatter: rag_collection
    gallery_preview: 'Vector search for this request: querying the index for chunks relevant to the user message.'
  - slug: conversation.received
    summary: Inbound chat message recorded for this conversation.
    gallery_preview: Inbound chat message recorded for this conversation.
  - slug: chat.request
    summary: Chat completion request accepted and prepared for upstream routing.
    gallery_preview: Chat completion request accepted and prepared for upstream routing.
  - slug: conversation.rag.span
    formatter: rag_collection
    gallery_preview: RAG retrieval span recorded for this conversation turn (links retrieval to the chat scope).
  - slug: upstream.models.ok
    formatter: upstream_models_ok
    gallery_preview: Upstream model catalog responded successfully.
  - slug: conversation.request.witness
    summary: 'Request witness logged: structured snapshot of the chat payload after normalization (message counts, roles, prompt size, tools) for correlation and auditing.'
