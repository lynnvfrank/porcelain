version: 1
locale: en
formatters:
  broker_bootstrap_complete:
    description: bootstrap_ms suffix
  broker_catalog_sync:
    description: catalog_model_count / pricing detail
  broker_chat_relay:
    description: chat.chimera-broker request/response/error
  broker_jwt_startup:
    description: JWT/API key/disabled from progress_detail
  broker_log_retention:
    description: log_retention_days or detail
  broker_plugin_status:
    description: plugin_name + plugin_status
  broker_progress_detail:
    description: Trim progress_detail for broker slugs
  broker_provider_id:
    description: provider_id suffix
  broker_provider_limits:
    description: chat.provider_limits.blocked reason
  broker_ready:
    description: listen_url or listen_port
  broker_routing_relay:
    description: chat.routing.* relay lines
  broker_trim_detail:
    description: chimeraBrokerTrimDetail helper
  broker_version:
    description: chimera_broker_version
  conversation_broker_started:
    description: upstreamModel for broker POST
  conversation_delivered:
    description: Turn completed + duration in event log
  conversation_errored:
    description: Turn failed + duration in event log
  conversation_fallback_model_not_found:
    description: willRetry-aware model not found during routing
  conversation_routing:
    description: virtual vs passthrough routing summary
  conversation_routing_rate_limit:
    description: TPM rate limit during routing (service panels)
  conversation_turn_started:
    description: turn_index, clientModel, message_count
  gateway_auth_reloaded:
    description: Optional Active keys count suffix
  gateway_catalog_fallback_unavailable_model:
    description: model_id, source, tenant_id for fallback chain audit
  gateway_health_upstream:
    description: ok, status, detail, target host
  gateway_operator_workspace_path_added:
    description: operator UI path add
  gateway_operator_workspace_path_deleted:
    description: operator UI path delete
  gateway_startup_config_resolved:
    description: filePath, api_keys_path, routingPolicyPath
  gateway_startup_disk_log:
    description: phase mkdir/open vs enabled path
  gateway_startup_listening:
    description: addr, broker host
  gateway_supervisor_bin_cfg:
    description: bin leaf + config path truncation
  gateway_supervisor_broker_start:
    description: bin, app_dir, host, port
  gateway_supervisor_url_tail:
    description: health-check URL host/path tail
  gateway_supervisor_vectorstore_start:
    description: bin, storage, http/grpc ports
  http_access:
    description: method path status responseTimeMs (summarized primary column)
  http_broker_inbound:
    description: Broker HTTP access / rate limit line
  indexer_discovery:
    description: discovery summary fields
  indexer_fanout:
    description: fanout enqueue/remainder
  indexer_gateway_config:
    description: chunk_size, embedding_model tail
  indexer_ingest_gate:
    description: ingest gate closed/open with reason and queue depth
  indexer_job_failed:
    description: shortIngestFailureDetail tail
  indexer_job_ingested:
    description: rel, chunks
  indexer_job_ingested_summary:
    description: batched ingest successes for a scope window
  indexer_job_skipped:
    description: rel, skip_reason
  indexer_job_skipped_summary:
    description: batched skip/ingest window deltas
  indexer_job_upload:
    description: rel, bytes, transport
  indexer_queue_snapshot:
    description: queue_depth, ingest_completed
  indexer_rag_source:
    description: rag.retrieve.source hits + rel
  indexer_retry_recovery:
    description: retry/recovery/pause lines
  indexer_run_done:
    description: mode, ingest_completed, failures
  indexer_run_progress:
    description: scan_scheduled and initial_scan milestones
  indexer_run_start:
    description: roots count and root_ids
  indexer_scope_active_file:
    description: project + rel
  indexer_scope_status:
    description: workspace/queue counts
  indexer_state:
    description: state label, queue_depth, ingest_inflight
  indexer_storage_stats:
    description: qdrant_points or unavailable detail
  indexer_supervised_hot_reload:
    description: config hot-reload session restart
  indexer_supervised_process_exit:
    description: supervised process exit detail
  indexer_supervised_session_fatal_exit:
    description: session fatal exit detail
  indexer_supervised_wait_roots:
    description: optional config_path suffix
  indexer_supervised_watch_shutdown_timeout:
    description: watch shutdown timeout detail
  indexer_supervised_workspaces_apply_failed:
    description: workspace path apply failure
  indexer_supervised_workspaces_changed:
    description: workspace path snapshot change
  indexer_supervised_workspaces_reload:
    description: watch session reload after path change
  indexer_supervised_workspaces_reload_stalled:
    description: reload stall detail
  indexer_supervised_workspaces_session_start:
    description: post-reload session start
  indexer_work_failed:
    description: work kind label
  ingest_complete:
    description: chunks, source, tenant
  rag_attached:
    description: hits + collection for conversation.rag.attached
  rag_collection:
    description: Append RAG collection label from flat.collection
  rag_retrieve_error:
    description: Summarize rag.retrieve.error err field
  upstream_models_ok:
    description: Optional count suffix
  vectorstore_collection_http:
    description: collection display + optional http status
  vectorstore_http_upsert_summary:
    description: batched upsert/delete/search counts and collections
  vectorstore_listen_ports:
    description: REST/gRPC port suffix
  vectorstore_progress_detail:
    description: progress_detail truncation
  vectorstore_version:
    description: qdrant_version in banner
indexer_states:
  backlog: Queued files to process
  idle: Idle
  initial_scanning: Scanning workspace
  recovery: Recovering (waiting for gateway / storage)
  uploading: Embedding
  watch_idle: Waiting for file changes
messages:
  - slug: gateway.http.access
    formatter: http_access
    aliases:
      - http response
    shape: http.access
    gallery_preview: GET /v1/chat/completions → 200 · 142 ms
  - slug: conversation.merge.embed_failed
    summary: Embedding failed so this turn cannot be associated with any current conversation; storing as a new conversation
    gallery_preview: Embedding failed — storing as a new conversation
  - slug: conversation.merge.disabled
    summary: Conversation merge is disabled because embedding URL or upstream API key is missing.
    gallery_preview: Conversation merge disabled — missing embedding or API key
  - slug: conversation.merge.embed_dim_mismatch
    summary: Embedding vector dimension does not match the configured index dimension.
    gallery_preview: Embedding dimension mismatch
  - slug: conversation.merge.list_candidates_failed
    summary: Could not list merge candidates from the operator store.
    gallery_preview: List merge candidates failed
  - slug: conversation.merge.dedup_read_failed
    summary: Could not read the dedup cache entry for this request body.
    gallery_preview: Dedup cache read failed
  - slug: conversation.merge.upsert_failed
    summary: Could not upsert the conversation merge row.
    gallery_preview: Merge upsert failed
  - slug: conversation.merge.snapshot_upsert_failed
    summary: Could not upsert the conversation resolve snapshot.
    gallery_preview: Resolve snapshot upsert failed
  - slug: conversation.merge.dedup_cache_write_failed
    summary: Could not write the dedup cache entry after merge.
    gallery_preview: Dedup cache write failed
  - slug: conversation.merge.resolve_failed
    summary: Conversation merge resolve failed before chat; continuing with a fresh conversation id.
    gallery_preview: Merge resolve failed — continuing with new id
  - slug: conversation.merged
    summary: This inbound turn was merged into an existing conversation (semantic or sticky match).
    gallery_preview: Conversation matched · merged into existing id
  - slug: conversation.dedup_hit
    summary: Identical request body matched a recent turn; reusing the cached conversation.
    gallery_preview: Conversation dedup hit
  - slug: conversation.response.witness
    summary: 'Response witness logged: completion size, finish reason, and chunk count for correlation.'
    gallery_preview: Response witness logged for correlation and auditing.
  - slug: conversation.payload.sample
    summary: Redacted head/tail excerpt of request or response payload (trace only).
    gallery_preview: Payload sample (trace)
  - slug: conversation.rag.attached
    formatter: rag_attached
    aliases:
      - RAG context attached to this turn
    gallery_preview: Retrieved context from collection · N chunks injected.
  - slug: conversation.rag.skipped
    summary: RAG retrieval was skipped for this turn (disabled, empty query, or no hits).
    gallery_preview: RAG skipped for this turn
  - slug: conversation.tool.router
    summary: Tool router pass completed for this chat request.
    gallery_preview: Tool router applied
  - slug: conversation.tool.call_started
    summary: Gateway started executing a tool call for this conversation turn.
    gallery_preview: Tool call started
  - slug: conversation.tool.call_completed
    summary: Tool call finished successfully for this conversation turn.
    gallery_preview: Tool call completed
  - slug: conversation.tool.call_failed
    summary: Tool call failed for this conversation turn.
    gallery_preview: Tool call failed
  - slug: conversation.broker.completed
    summary: chimera-broker request completed for this conversation turn.
    gallery_preview: chimera-broker request completed
  - slug: conversation.broker.failed
    summary: chimera-broker request failed for this conversation turn.
    gallery_preview: chimera-broker request failed
  - slug: conversation.fallback.attempted
    summary: Continuing to the next model in the fallback chain after an upstream failure.
    gallery_preview: Fallback routing continued
  - slug: conversation.fallback.exhausted
    summary: All models in the routing fallback chain were exhausted.
    gallery_preview: Fallback chain exhausted
  - slug: conversation.fallback.model_not_found
