<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chimera — Admin login</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 3rem auto; padding: 0 1rem; }
    label { display: block; margin-bottom: 0.35rem; font-weight: 600; }
    input { width: 100%; padding: 0.5rem; box-sizing: border-box; margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    .err { color: #a40000; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Chimera admin</h1>
  <p>Sign in with a gateway token. On first run (no <code>api-keys.yaml</code> rows yet), start Chimera from your bundle — it listens on <strong>localhost</strong> and opens <strong>setup</strong> to create a token; then restart for the full stack.</p>
  <form id="f">
    <label for="token">Gateway token</label>
    <input id="token" name="token" type="password" autocomplete="current-password" required/>
    <button type="submit">Sign in</button>
    <p id="msg" class="err" hidden></p>
  </form>
  <script>
(function () {
  var f = document.getElementById("f");
  var msg = document.getElementById("msg");
  f.addEventListener("submit", function (e) {
    e.preventDefault();
    msg.hidden = true;
    var token = (document.getElementById("token").value || "").trim();
    fetch("/api/ui/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: token })
    }).then(function (r) {
      if (r.ok) {
        var next = new URLSearchParams(window.location.search).get("next") || "";
        if (next.indexOf("/") !== 0 || next.indexOf("//") === 0 || next.indexOf("/ui/") !== 0) {
          next = "/ui/logs";
        }
        window.location.href = next;
        return;
      }
      return r.json().then(function (j) {
        throw new Error((j && j.error) || ("HTTP " + r.status));
      }).catch(function () {
        throw new Error("HTTP " + r.status);
      });
    }).catch(function (err) {
      msg.textContent = err.message || String(err);
      msg.hidden = false;
    });
  });
})();
  </script>
</body>
</html>
