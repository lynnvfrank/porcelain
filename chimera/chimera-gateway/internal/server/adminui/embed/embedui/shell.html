<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chimera</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
    }
    #shell-top {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      padding: 0.35rem 0.5rem;
      position: relative;
      z-index: 2;
    }
    #shell-top .spacer { flex: 1 1 auto; }
    #btn-reload {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #333;
      border-radius: 4px;
    }
    #btn-reload:hover { background: #e5e5e5; }
    #btn-reload .reload-icon {
      display: block;
      width: 18px;
      height: 18px;
      background-color: currentColor;
      -webkit-mask: url("/ui/assets/reload.svg") center / contain no-repeat;
      mask: url("/ui/assets/reload.svg") center / contain no-repeat;
    }
    #btn-settings {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #333;
      border-radius: 4px;
      min-width: 2.1rem;
    }
    #btn-settings:hover { background: #e5e5e5; }
    #btn-settings .settings-icon {
      display: inline-block;
      font-size: 1.05rem;
      line-height: 1;
      font-weight: 600;
    }
    #btn-settings .settings-icon--close { display: none; }
    #btn-settings.is-logs .settings-icon--gear { display: none; }
    #btn-settings.is-logs .settings-icon--close { display: inline-block; }
    #frame-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <header id="shell-top">
    <span class="spacer" aria-hidden="true"></span>
    <button type="button" id="btn-reload" title="Reload (Shift+Click: reset cache)" aria-label="Reload (Shift+Click: reset cache)">
      <span class="reload-icon" aria-hidden="true"></span>
    </button>
    <button type="button" id="btn-settings" title="Open settings" aria-label="Open settings">
      <span class="settings-icon settings-icon--gear" aria-hidden="true">&#9881;</span>
      <span class="settings-icon settings-icon--close" aria-hidden="true">X</span>
    </button>
  </header>
  <div id="frame-wrap">
    <iframe id="f-main" title="Operator page" src="about:blank"></iframe>
  </div>
  <script>
(function () {
  var DEFAULT_ROUTE = "/ui/pwa";
  var LOGS_ROUTE = "/ui/logs?embed=1";
  var LS_CURRENT_ROUTE = "chimera.shell.currentRoute.v1";
  var LS_RETURN_ROUTE = "chimera.shell.settingsReturnRoute.v1";
  var origin = window.location.origin;
  var frame = document.getElementById("f-main");
  var reloadBtn = document.getElementById("btn-reload");
  var settingsBtn = document.getElementById("btn-settings");

  function safeGetLS(k) {
    try { return localStorage.getItem(k) || ""; } catch (_e) { return ""; }
  }
  function safeSetLS(k, v) {
    try { localStorage.setItem(k, String(v || "")); } catch (_e) {}
  }
  function normalizeRoute(raw) {
    var s = String(raw || "").trim();
    if (!s) return "";
    try {
      var u = new URL(s, origin);
      if (u.origin !== origin) return "";
      if (!u.pathname || u.pathname.charAt(0) !== "/") return "";
      return u.pathname + (u.search || "") + (u.hash || "");
    } catch (_e) {
      return "";
    }
  }
  function getSafeRoute(raw, fallback) {
    var n = normalizeRoute(raw);
    return n || fallback;
  }
  function isLogsRoute(route) {
    return String(route || "").indexOf("/ui/logs") === 0;
  }
  function updateSettingsButton(isLogs) {
    if (!settingsBtn) return;
    settingsBtn.classList.toggle("is-logs", !!isLogs);
    if (isLogs) {
      settingsBtn.title = "Close settings";
      settingsBtn.setAttribute("aria-label", "Close settings");
    } else {
      settingsBtn.title = "Open settings";
      settingsBtn.setAttribute("aria-label", "Open settings");
    }
  }
  function currentRouteFromFrame() {
    try {
      if (frame && frame.contentWindow && frame.contentWindow.location) {
        return normalizeRoute(frame.contentWindow.location.href);
      }
    } catch (_e) {}
    try {
      return normalizeRoute(frame.getAttribute("src") || frame.src);
    } catch (_e2) {
      return "";
    }
  }
  function navigateFrame(route) {
    var target = getSafeRoute(route, DEFAULT_ROUTE);
    if (!frame) return;
    frame.src = target;
    safeSetLS(LS_CURRENT_ROUTE, target);
    updateSettingsButton(isLogsRoute(target));
  }
  function notifyLogsActive() {
    var route = currentRouteFromFrame();
    if (!isLogsRoute(route)) return;
    var w = frame && frame.contentWindow;
    try {
      if (w) {
        w.postMessage({ type: "chimera-logs-activate" }, origin);
      }
    } catch (e) {}
  }
  if (frame) {
    frame.addEventListener("load", function () {
      var loadedRoute = getSafeRoute(currentRouteFromFrame(), DEFAULT_ROUTE);
      safeSetLS(LS_CURRENT_ROUTE, loadedRoute);
      updateSettingsButton(isLogsRoute(loadedRoute));
      notifyLogsActive();
    });
  }
  var startupRoute = getSafeRoute(safeGetLS(LS_CURRENT_ROUTE), DEFAULT_ROUTE);
  navigateFrame(startupRoute);

  function cacheBustedSrc(src) {
    var s = String(src || "");
    if (!s || s === "about:blank") return s;
    var hash = "";
    var hIdx = s.indexOf("#");
    if (hIdx >= 0) { hash = s.slice(hIdx); s = s.slice(0, hIdx); }
    var q = s.indexOf("?") >= 0 ? "&" : "?";
    return s + q + "__reload=" + Date.now() + hash;
  }

  async function resetWebviewCacheBestEffort() {
    try { sessionStorage.clear(); } catch (_e) {}
    try {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i));
      for (var j = 0; j < keys.length; j++) {
        var k = keys[j] || "";
        if (k.indexOf("chimera.") === 0 || k.indexOf("chimera_") === 0 || k.indexOf("chimeraLogs") === 0 || k.indexOf("chimera_logs_") === 0) {
          try { localStorage.removeItem(k); } catch (_e2) {}
        }
      }
    } catch (_e3) {}
    try {
      if (globalThis.caches && caches.keys) {
        var cks = await caches.keys();
        for (var ck = 0; ck < cks.length; ck++) {
          try { await caches.delete(cks[ck]); } catch (_e4) {}
        }
      }
    } catch (_e5) {}
    try {
      if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r = 0; r < regs.length; r++) {
          try { await regs[r].unregister(); } catch (_e6) {}
        }
      }
    } catch (_e7) {}
    try {
      if (globalThis.indexedDB && indexedDB.databases && indexedDB.deleteDatabase) {
        var dbs = await indexedDB.databases();
        for (var d = 0; d < dbs.length; d++) {
          var nm = dbs[d] && dbs[d].name ? String(dbs[d].name) : "";
          if (!nm) continue;
          try { indexedDB.deleteDatabase(nm); } catch (_e8) {}
        }
      }
    } catch (_e9) {}
  }

  function reloadCurrent(ev) {
    var fr = frame;
    if (!fr) return;
    var wantReset = !!(ev && ev.shiftKey);
    if (!wantReset) {
      try {
        if (fr.contentWindow && fr.contentWindow.location && fr.contentWindow.location.reload) {
          fr.contentWindow.location.reload();
          return;
        }
      } catch (_e2) {}
      try { fr.src = cacheBustedSrc(fr.getAttribute("src") || fr.src); } catch (_e3) {}
      return;
    }
    Promise.resolve()
      .then(function () { return resetWebviewCacheBestEffort(); })
      .then(function () {
        try { fr.src = cacheBustedSrc(fr.getAttribute("src") || fr.src); } catch (_e4) {}
      });
  }

  if (reloadBtn) {
    reloadBtn.addEventListener("click", function (ev) {
      reloadCurrent(ev);
    });
  }
  if (settingsBtn) {
    settingsBtn.addEventListener("click", function () {
      var route = getSafeRoute(currentRouteFromFrame(), DEFAULT_ROUTE);
      if (isLogsRoute(route)) {
        var backTo = getSafeRoute(safeGetLS(LS_RETURN_ROUTE), DEFAULT_ROUTE);
        navigateFrame(backTo);
        return;
      }
      safeSetLS(LS_RETURN_ROUTE, route);
      navigateFrame(LOGS_ROUTE);
    });
  }
})();
  </script>
</body>
</html>
