<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chimera — Admin login</title>
  <script src="/ui/assets/embed-theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui/assets/theme-tokens.css" />
  <link rel="stylesheet" href="/ui/assets/ui.css" />
</head>
<body class="embed-page embed-page--narrow embed-page--login">
  <h1>Chimera admin</h1>
  <p>Sign in with a gateway token. On first run (no <code>api-keys.yaml</code> rows yet), start Chimera from your bundle — it listens on <strong>localhost</strong> and opens <strong>setup</strong> to create a token; then restart for the full stack.</p>
  <form id="f">
    <label class="embed-field" for="token">
      <span class="embed-field-label">Gateway token</span>
      <input class="embed-input" id="token" name="token" type="password" autocomplete="current-password" required/>
    </label>
    <button type="submit" class="btn btn--primary">Sign in</button>
    <p id="msg" class="err" hidden></p>
  </form>
  <script>
(function () {
  var f = document.getElementById("f");
  var msg = document.getElementById("msg");
  f.addEventListener("submit", function (e) {
    e.preventDefault();
    msg.hidden = true;
    var token = (document.getElementById("token").value || "").trim();
    fetch("/api/ui/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: token })
    }).then(function (r) {
      if (r.ok) {
        var next = new URLSearchParams(window.location.search).get("next") || "";
        if (next.indexOf("/") !== 0 || next.indexOf("//") === 0 || next.indexOf("/ui/") !== 0) {
          next = "/ui";
        }
        window.location.href = next;
        return;
      }
      return r.json().then(function (j) {
        throw new Error((j && j.error) || ("HTTP " + r.status));
      }).catch(function () {
        throw new Error("HTTP " + r.status);
      });
    }).catch(function (err) {
      msg.textContent = err.message || String(err);
      msg.hidden = false;
    });
  });
})();
  </script>
</body>
</html>
