<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Porcelain</title>
  <script src="/ui/assets/embed-theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui/assets/theme-tokens.css" />
  <link rel="stylesheet" href="/ui/assets/ui.css" />
  <link rel="stylesheet" href="/ui/assets/styles/shell-ribbon.css" />
  <link rel="stylesheet" href="/ui/assets/styles/chat.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body.shell-page {
      display: flex;
      flex-direction: column;
    }
    #frame-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body class="shell-page">
  <div class="shell-body">
    <nav id="shell-ribbon" class="shell-ribbon" aria-label="Navigation" aria-expanded="false">
      <div class="shell-ribbon__inner">
        <div class="shell-ribbon__header">
          <div class="shell-ribbon__brand-row">
            <span class="shell-ribbon__brand">Porcelain</span>
            <button type="button" class="shell-ribbon__btn shell-ribbon__toggle" data-ribbon-action="toggle" title="Show chat history" aria-label="Show chat history">
              <span class="material-symbols-outlined" aria-hidden="true">side_navigation</span>
            </button>
          </div>
          <button type="button" class="shell-ribbon__btn shell-ribbon__new-chat" data-ribbon-action="new-chat" title="New chat" aria-label="New chat">
            <span class="material-symbols-outlined" aria-hidden="true">edit_square</span>
            <span class="shell-ribbon__label">New chat</span>
          </button>
        </div>
        <div id="shell-ribbon-filters" class="shell-ribbon__filters" aria-label="History filter"></div>
        <hr class="shell-ribbon__rule" aria-hidden="true" />
        <div class="shell-ribbon__history-wrap">
          <aside id="chat-history" class="chat-history" aria-label="Conversation history"></aside>
        </div>
        <div class="shell-ribbon__footer">
          <button type="button" class="shell-ribbon__btn shell-ribbon__settings" data-ribbon-action="settings" title="Settings" aria-label="Settings">
            <span class="material-symbols-outlined" aria-hidden="true">settings</span>
            <span class="shell-ribbon__label">Settings</span>
          </button>
        </div>
      </div>
    </nav>
    <div id="frame-wrap">
      <iframe id="f-main" title="Operator page" src="about:blank"></iframe>
    </div>
  </div>
  <script src="/ui/assets/ui/util/escape.js"></script>
  <script src="/ui/assets/chat/historyClient.js"></script>
  <script src="/ui/assets/chat/historyPanel.js"></script>
  <script src="/ui/assets/shell/navRibbon.js"></script>
  <script>
(function () {
  var DEFAULT_ROUTE = "/ui/chat";
  var SETTINGS_ROUTE = "/ui/settings?embed=1";
  var shellReturnRoute = DEFAULT_ROUTE;
  var shellReturnConversationId = "";
  var origin = window.location.origin;
  var frame = document.getElementById("f-main");
  var ribbonEl = document.getElementById("shell-ribbon");
  var historyRoot = document.getElementById("chat-history");

  function normalizeRoute(raw) {
    var s = String(raw || "").trim();
    if (!s) return "";
    try {
      var u = new URL(s, origin);
      if (u.origin !== origin) return "";
      if (!u.pathname || u.pathname.charAt(0) !== "/") return "";
      return u.pathname + (u.search || "") + (u.hash || "");
    } catch (_e) {
      return "";
    }
  }
  function getSafeRoute(raw, fallback) {
    var n = normalizeRoute(raw);
    return n || fallback;
  }
  function routePath(route) {
    var r = String(route || "");
    var q = r.indexOf("?");
    return q >= 0 ? r.slice(0, q) : r;
  }
  function isSettingsRoute(route) {
    return routePath(route).indexOf("/ui/settings") === 0;
  }
  function isChatRoute(route) {
    return routePath(route) === "/ui/chat";
  }
  function currentRouteFromFrame() {
    try {
      if (frame && frame.contentWindow && frame.contentWindow.location) {
        return normalizeRoute(frame.contentWindow.location.href);
      }
    } catch (_e) {}
    try {
      return normalizeRoute(frame.getAttribute("src") || frame.src);
    } catch (_e2) {
      return "";
    }
  }
  function navigateFrame(route) {
    var target = getSafeRoute(route, DEFAULT_ROUTE);
    if (!frame) return;
    frame.src = target;
  }
  function notifySettingsActive() {
    var route = currentRouteFromFrame();
    if (!isSettingsRoute(route)) return;
    var w = frame && frame.contentWindow;
    try {
      if (w) {
        w.postMessage({ type: "chimera-settings-activate" }, origin);
      }
    } catch (e) {}
  }
  if (frame) {
    frame.addEventListener("load", function () {
      notifySettingsActive();
    });
  }

  ChimeraShell.NavRibbon.mount({
    ribbon: ribbonEl,
    historyRoot: historyRoot,
    frame: frame,
    origin: origin,
    navigateFrame: navigateFrame,
    currentRouteFromFrame: currentRouteFromFrame,
    isSettingsRoute: isSettingsRoute,
    isChatRoute: isChatRoute,
    getShellReturnRoute: function () {
      return shellReturnRoute;
    },
    setShellReturnRoute: function (route) {
      shellReturnRoute = getSafeRoute(route, DEFAULT_ROUTE);
    },
    getShellReturnConversationId: function () {
      return shellReturnConversationId;
    },
    setShellReturnConversationId: function (conversationId) {
      shellReturnConversationId = String(conversationId || "").trim();
    }
  });

  navigateFrame(DEFAULT_ROUTE);
})();
  </script>
</body>
</html>
