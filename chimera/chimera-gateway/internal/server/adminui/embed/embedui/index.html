<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chimera</title>
  <script src="/ui/assets/embed-theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui/assets/theme-tokens.css" />
  <link rel="stylesheet" href="/ui/assets/styles/shell.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
    }
    #btn-reload {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }
    #btn-reload .material-symbols-outlined {
      display: inline-block;
      font-size: 1.25rem;
      line-height: 1;
      transition: transform 0.55s ease;
    }
    #btn-reload:hover .material-symbols-outlined {
      transform: rotate(45deg);
    }
    #btn-settings {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      min-width: 2.1rem;
    }
    #btn-settings .settings-icon {
      display: inline-block;
      font-size: 1.25rem;
      line-height: 1;
      font-weight: 600;
      transition: transform 0.55s ease;
    }
    #btn-settings:hover .settings-icon {
      transform: rotate(45deg);
    }
    @media (prefers-reduced-motion: reduce) {
      #btn-reload .material-symbols-outlined,
      #btn-settings .settings-icon {
        transition: none;
      }
      #btn-reload:hover .material-symbols-outlined,
      #btn-settings:hover .settings-icon {
        transform: none;
      }
    }
    #btn-settings .settings-icon--close { display: none; }
    #btn-settings.is-settings .settings-icon--gear { display: none; }
    #btn-settings.is-settings .settings-icon--close { display: inline-block; }
    #shell-top {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    #frame-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body class="shell-page">
  <header id="shell-top">
    <nav id="shell-menu-chat" class="shell-menu" aria-label="Chat actions" hidden>
      <button type="button" class="shell-menu__btn" id="shell-chat-new" title="Start a new conversation">New chat</button>
      <button type="button" class="shell-menu__btn" id="shell-chat-copy-all" title="Copy conversation as Markdown">Copy chat</button>
    </nav>
    <nav id="shell-menu-settings" class="shell-menu" aria-label="Settings actions" hidden></nav>
    <span class="spacer" aria-hidden="true"></span>
    <button type="button" id="btn-reload" title="Reload (Shift+Click: reset cache)" aria-label="Reload (Shift+Click: reset cache)">
      <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
    </button>
    <button type="button" id="btn-settings" title="Open settings" aria-label="Open settings">
      <span class="settings-icon settings-icon--gear" aria-hidden="true">&#9881;</span>
      <span class="settings-icon settings-icon--close" aria-hidden="true">X</span>
    </button>
  </header>
  <div id="frame-wrap">
    <iframe id="f-main" title="Operator page" src="about:blank"></iframe>
  </div>
  <script>
(function () {
  var DEFAULT_ROUTE = "/ui/chat";
  var SETTINGS_ROUTE = "/ui/settings?embed=1";
  var shellReturnRoute = DEFAULT_ROUTE;
  var origin = window.location.origin;
  var frame = document.getElementById("f-main");
  var reloadBtn = document.getElementById("btn-reload");
  var settingsBtn = document.getElementById("btn-settings");
  var chatMenu = document.getElementById("shell-menu-chat");
  var settingsMenu = document.getElementById("shell-menu-settings");
  var chatNewBtn = document.getElementById("shell-chat-new");
  var chatCopyAllBtn = document.getElementById("shell-chat-copy-all");

  function normalizeRoute(raw) {
    var s = String(raw || "").trim();
    if (!s) return "";
    try {
      var u = new URL(s, origin);
      if (u.origin !== origin) return "";
      if (!u.pathname || u.pathname.charAt(0) !== "/") return "";
      return u.pathname + (u.search || "") + (u.hash || "");
    } catch (_e) {
      return "";
    }
  }
  function getSafeRoute(raw, fallback) {
    var n = normalizeRoute(raw);
    return n || fallback;
  }
  function routePath(route) {
    var r = String(route || "");
    var q = r.indexOf("?");
    return q >= 0 ? r.slice(0, q) : r;
  }
  function isSettingsRoute(route) {
    return routePath(route).indexOf("/ui/settings") === 0;
  }
  function isChatRoute(route) {
    return routePath(route) === "/ui/chat";
  }
  function updateSettingsButton(inSettings) {
    if (!settingsBtn) return;
    settingsBtn.classList.toggle("is-settings", !!inSettings);
    if (inSettings) {
      settingsBtn.title = "Close settings";
      settingsBtn.setAttribute("aria-label", "Close settings");
    } else {
      settingsBtn.title = "Open settings";
      settingsBtn.setAttribute("aria-label", "Open settings");
    }
  }
  function updateMenuBars(route) {
    var chat = isChatRoute(route);
    var settings = isSettingsRoute(route);
    if (chatMenu) chatMenu.hidden = !chat;
    if (settingsMenu) settingsMenu.hidden = !settings;
  }
  function currentRouteFromFrame() {
    try {
      if (frame && frame.contentWindow && frame.contentWindow.location) {
        return normalizeRoute(frame.contentWindow.location.href);
      }
    } catch (_e) {}
    try {
      return normalizeRoute(frame.getAttribute("src") || frame.src);
    } catch (_e2) {
      return "";
    }
  }
  function postChatAction(action) {
    var w = frame && frame.contentWindow;
    if (!w) return;
    try {
      w.postMessage({ type: "chimera-chat-action", action: action }, origin);
    } catch (_e) {}
  }
  function legacyCopyText(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    var ok = false;
    try {
      ok = document.execCommand("copy");
    } catch (_e2) {}
    document.body.removeChild(ta);
    return ok;
  }
  function copyText(text) {
    var t = String(text || "");
    if (!t) return Promise.resolve(false);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(t).catch(function () {
        return legacyCopyText(t);
      });
    }
    return Promise.resolve(legacyCopyText(t));
  }
  function readChatTranscript() {
    var w = frame && frame.contentWindow;
    if (!w) return "";
    try {
      if (w.ChimeraChat && w.ChimeraChat.App && typeof w.ChimeraChat.App.getTranscriptText === "function") {
        return String(w.ChimeraChat.App.getTranscriptText() || "");
      }
    } catch (_e) {}
    return "";
  }
  function copyChatFromFrame() {
    if (!isChatRoute(currentRouteFromFrame())) return;
    var text = readChatTranscript().trim();
    if (!text) return;
    copyText(text);
  }
  function navigateFrame(route) {
    var target = getSafeRoute(route, DEFAULT_ROUTE);
    if (!frame) return;
    frame.src = target;
    updateSettingsButton(isSettingsRoute(target));
    updateMenuBars(target);
  }
  function notifySettingsActive() {
    var route = currentRouteFromFrame();
    if (!isSettingsRoute(route)) return;
    var w = frame && frame.contentWindow;
    try {
      if (w) {
        w.postMessage({ type: "chimera-settings-activate" }, origin);
      }
    } catch (e) {}
  }
  if (frame) {
    frame.addEventListener("load", function () {
      var loadedRoute = getSafeRoute(currentRouteFromFrame(), DEFAULT_ROUTE);
      updateSettingsButton(isSettingsRoute(loadedRoute));
      updateMenuBars(loadedRoute);
      notifySettingsActive();
    });
  }
  navigateFrame(DEFAULT_ROUTE);

  function cacheBustedSrc(src) {
    var s = String(src || "");
    if (!s || s === "about:blank") return s;
    var hash = "";
    var hIdx = s.indexOf("#");
    if (hIdx >= 0) { hash = s.slice(hIdx); s = s.slice(0, hIdx); }
    var q = s.indexOf("?") >= 0 ? "&" : "?";
    return s + q + "__reload=" + Date.now() + hash;
  }

  async function resetWebviewCacheBestEffort() {
    try { sessionStorage.clear(); } catch (_e) {}
    try {
      if (globalThis.caches && caches.keys) {
        var cks = await caches.keys();
        for (var ck = 0; ck < cks.length; ck++) {
          try { await caches.delete(cks[ck]); } catch (_e4) {}
        }
      }
    } catch (_e5) {}
    try {
      if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r = 0; r < regs.length; r++) {
          try { await regs[r].unregister(); } catch (_e6) {}
        }
      }
    } catch (_e7) {}
    try {
      if (globalThis.indexedDB && indexedDB.databases && indexedDB.deleteDatabase) {
        var dbs = await indexedDB.databases();
        for (var d = 0; d < dbs.length; d++) {
          var nm = dbs[d] && dbs[d].name ? String(dbs[d].name) : "";
          if (!nm) continue;
          try { indexedDB.deleteDatabase(nm); } catch (_e8) {}
        }
      }
    } catch (_e9) {}
  }

  function reloadCurrent(ev) {
    var fr = frame;
    if (!fr) return;
    var wantReset = !!(ev && ev.shiftKey);
    if (!wantReset) {
      try {
        if (fr.contentWindow && fr.contentWindow.location && fr.contentWindow.location.reload) {
          fr.contentWindow.location.reload();
          return;
        }
      } catch (_e2) {}
      try { fr.src = cacheBustedSrc(fr.getAttribute("src") || fr.src); } catch (_e3) {}
      return;
    }
    Promise.resolve()
      .then(function () { return resetWebviewCacheBestEffort(); })
      .then(function () {
        try { fr.src = cacheBustedSrc(fr.getAttribute("src") || fr.src); } catch (_e4) {}
      });
  }

  if (reloadBtn) {
    reloadBtn.addEventListener("click", function (ev) {
      reloadCurrent(ev);
    });
  }
  if (settingsBtn) {
    settingsBtn.addEventListener("click", function () {
      var route = getSafeRoute(currentRouteFromFrame(), DEFAULT_ROUTE);
      if (isSettingsRoute(route)) {
        navigateFrame(getSafeRoute(shellReturnRoute, DEFAULT_ROUTE));
        return;
      }
      shellReturnRoute = route;
      navigateFrame(SETTINGS_ROUTE);
    });
  }
  if (chatNewBtn) {
    chatNewBtn.addEventListener("click", function () {
      postChatAction("new");
    });
  }
  if (chatCopyAllBtn) {
    chatCopyAllBtn.addEventListener("click", function () {
      copyChatFromFrame();
    });
  }
})();
  </script>
</body>
</html>
