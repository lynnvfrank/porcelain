# Copy to `gateway.yaml` and edit. See docs/configuration.md.

gateway:
  semver: "0.2.0"
  listen_port: 3000
  listen_host: "0.0.0.0"
  # Gateway process logger (text slog to stdout and the in-memory log ring for /ui/logs).
  # Allowed: trace | debug | info | warn | error. Empty or unknown → info.
  #
  # Rough verbosity (lower = more chatty):
  #   trace — includes very chatty traces (e.g. RAG) and Phase 8 `conversation.payload.sample`
  #           (redacted head/tail of request/response JSON when that path is enabled).
  #   debug — developer detail without full trace noise.
  #   info  — default for production-style runs; still includes Phase 8 witness *summaries*
  #           (`conversation.request.witness` / `conversation.response.witness`: counts, sizes,
  #           role histograms — no raw body text).
  #   warn | error — quieter.
  #
  # Override (takes precedence over this file): environment variable LOG_LEVEL with the same names.
  # Example: LOG_LEVEL=trace claudia serve
  #
  # BiFrost (upstream proxy) logging is separate: see upstream.bifrost_log_level below.
  log_level: "debug"
  #
  # Optional: *payload samples* only (`msg` = conversation.payload.sample).
  # Witness *summaries* at info are unaffected; they always follow chat paths when implemented.
  #
  #   payload_sample_max_chars — max UTF-8 runes for each of head and tail after redaction
  #     (default 256 if you omit `log_witness`; clamped between 32 and 4096 when set).
  #   force_payload_sample_at_debug — if true, allow emitting payload samples when log_level is
  #     debug (still redacted; dev-only). When false, samples are only *attempted* when
  #     log_level is trace. Note: each sample line is logged at slog "trace" (-8), so it only
  #     appears in output if the effective logger level includes trace — typically set
  #     log_level: trace or LOG_LEVEL=trace when you want to see samples.
  #
  # Examples (uncomment and adjust):
  #   # Dev: see redacted JSON snippets in logs.
  #   log_level: trace
  #   log_witness:
  #     payload_sample_max_chars: 512
  #     force_payload_sample_at_debug: false
  #
  #   # Dev: keep log_level at debug but opt in to sample emission (still need trace visible;
  #   # use LOG_LEVEL=trace if samples do not appear).
  #   log_level: trace
  #   log_witness:
  #     payload_sample_max_chars: 256
  #     force_payload_sample_at_debug: true

upstream:
  # OpenAI-compatible upstream (BiFrost on the host).
  base_url: "http://127.0.0.1:8080"
  api_key_env: "CLAUDIA_UPSTREAM_API_KEY"
  # BiFrost subprocess only (not the Go gateway). Typical: info | debug. CLI `-bifrost-log-level` overrides when non-empty.
  bifrost_log_level: "info"
  # api_key: optional Bearer for upstream /v1/*. If omitted and api_key_env is unset/empty, a secret is generated and written here on first gateway start.

health:
  timeout_ms: 5000
  chat_timeout_ms: 300000
  # Period (ms) for the BiFrost `/v1/models` poll that drives the Provider health
  # strip in /ui/logs and runtime catalog auditors. 0 disables periodic polling
  # (one-shot startup refresh and per-home-page-load refresh still happen).
  available_models_poll_ms: 30000

paths:
  tokens: "./tokens.yaml"
  routing_policy: "./routing-policy.yaml"
  provider_free_tier: "./provider-free-tier.yaml"
  # Vendor quota ceilings for admission/guards; see docs/plans/version-v0.1.1.md §3.7.
  # Omitting the file entirely or shipping it empty means no enforcement.
  provider_model_limits: "./provider-model-limits.yaml"

routing:
  filter_free_tier_models: true
  fallback_chain:
    - "groq/llama-3.3-70b-versatile"
    - "groq/openai/gpt-oss-120b"
    - "groq/qwen/qwen3-32b"
    - "groq/meta-llama/llama-4-scout-17b-16e-instruct"
    - "groq/openai/gpt-oss-20b"
    - "groq/openai/gpt-oss-safeguard-20b"
    - "groq/llama-3.1-8b-instant"
    - "groq/allam-2-7b"
    - "groq/meta-llama/llama-prompt-guard-2-22m"
    - "groq/meta-llama/llama-prompt-guard-2-86m"
    - "gemini/gemini-2.5-flash"
    - "gemini/gemini-2.5-flash-native-audio-preview-12-2025"
    - "gemini/gemini-2.5-flash-preview-tts"
    - "gemini/gemini-3-flash-preview"
    - "gemini/gemini-3.1-flash-live-preview"
    - "groq/canopylabs/orpheus-arabic-saudi"
    - "groq/canopylabs/orpheus-v1-english"
    - "groq/groq/compound"
    - "groq/whisper-large-v3"
    - "groq/whisper-large-v3-turbo"
    - "gemini/gemini-2.5-flash-lite"
    - "gemini/gemini-3.1-flash-lite-preview"
    - "gemini/gemini-embedding-001"
    - "gemini/gemini-embedding-2-preview"
    - "gemini/gemini-robotics-er-1.5-preview"
    - "groq/groq/compound-mini"
    - "ollama/llama3.2:3b"
    - "ollama/qwen3.5:9b"
  # Ordered list of upstream models used for the tool-router transformer (try in order; see docs/plans/version-v0.1.1.md).
  # Leave empty to skip router calls. When non-empty, POST /v1/chat/completions may call the first working model
  # to score tools before the main upstream completion.
  router_models: []
    # - "ollama/llama3.2:3b"
    # - "ollama/qwen3.5:9b"
    # - "groq/groq/compound-mini"
    # - "groq/groq/compound"
    # - "gemini/gemini-3.1-flash-lite-preview"
    # - "gemini/gemini-2.5-flash-lite"
  tool_router:
    enabled: false
    confidence_threshold: 0.5

# Gateway metrics (SQLite under ../data/gateway/ relative to this file; see docs/plans/version-v0.1.1.md §3.6).
metrics:
  enabled: true
  # sqlite_path: "../data/gateway/metrics.sqlite"
  # migrations_dir: "../migrations/gateway"

# Operator SQLite: supervised indexer workspaces (paths + project/flavor). Separate file from metrics.
# operator:
#   sqlite_path: "../data/gateway/operator.sqlite"
#   migrations_dir: "../migrations/operator"

# Merge chat sessions per tenant + X-Claudia-Project / X-Claudia-Flavor when the client omits
# X-Claudia-Conversation-Id, using embeddings (rag.embedding) + SQLite state. Requires metrics.enabled.
# conversation_merge:
#   enabled: true
#   match_threshold: 0.75
#   recent_window_minutes: 10
#   candidate_limit: 32
#   max_idle_hours: 168
#   # When enabled, defaults attach follow-ups to the latest session within 45m if cosine ≥ 0.18
#   # or the user message is short (≤220 runes). Set session_attach_minutes: 0 to disable only sticky attach.
#   # session_attach_minutes: 45
#   # session_attach_min_cosine: 0.18
#   # session_short_follow_up_runes: 220

# Optional: supervise claudia-index under `claudia serve` / claudia-desktop (v0.5+).
# When enabled, the gateway starts the file indexer after BiFrost is healthy; the child
# receives CLAUDIA_GATEWAY_URL and a merged --config at config_path (default under ../data/gateway/).
# Set CLAUDIA_GATEWAY_TOKEN in the environment so ingest can authenticate. Structured stderr
# (--log-json) lands in the same ring buffer as BiFrost — filter /ui/logs by source "indexer".
# Full behavior: docs/indexer.md (supervised mode), docs/supervisor.md.
indexer:
  supervised:
    enabled: false
    log_json: false
    # bin: ""                          # optional path to claudia-index; empty → next to claudia or PATH
    # config_path: "../data/gateway/indexer.supervised.yaml"
    # start_when_rag_disabled: false # if true, start indexer even when rag.enabled is false

# v0.2 Retrieval-Augmented Generation. When enabled, the virtual Claudia model
# performs Qdrant retrieval before chat; POST /v1/ingest, GET /v1/indexer/*,
# and the /health Qdrant probe are activated. See docs/plans/version-v0.2.md.
rag:
  enabled: true
  qdrant:
    url: "http://127.0.0.1:6333"
    log_level: "info"        # supervised native Qdrant QDRANT__LOGGER__LOG_LEVEL; `-qdrant-log-level` overrides when non-empty
    # api_key: "..."          # optional Qdrant API key
  embedding:
    # base_url defaults to upstream.base_url when empty.
    # base_url: ""
    path: "/v1/embeddings"
    model: "ollama/nomic-embed-text:latest"
    dim: 768
  chunking:
    size: 512
    overlap: 128
  retrieval:
    top_k: 8
    score_threshold: 0.50
  ingest:
    max_bytes: 10485760       # 10 MiB; total bytes per document (whole or chunked session)
    # Largest body for a single POST /v1/ingest; larger files use /v1/ingest/session (default = max_bytes)
    # max_whole_file_bytes: 2097152
  defaults:
    project_id: "default"
    flavor_id: ""
