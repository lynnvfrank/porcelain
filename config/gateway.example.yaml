# Copy to `gateway.yaml` and edit. Full reference: docs/configuration.md
#
# Comment style in this file:
#   - Block comments introduce each top-level section.
#   - Active settings have a short comment on the line above the key.
#   - Optional overrides appear as commented lines (# key: value) directly under the field they replace.

# chimera-gateway: client-facing API, operator UI, routing, and RAG orchestration.
#
# Binds HTTP (listen_host / listen_port) and defines the virtual model id (Chimera-<semver>).
gateway:
  # Semantic version for the virtual model id (Chimera-<semver>).
  semver: "0.2.0"
  # HTTP listen address for chimera-gateway.
  listen_host: "127.0.0.1"
  listen_port: 3000
  # Levels: trace | debug | info | warn | error. Empty or unknown → info.
  # LOG_LEVEL in the environment overrides this value.
  log_level: "info"
  # chimera-broker logging is separate: broker.log_level below.
  #
  # Optional redacted request/response snippets (msg = conversation.payload.sample).
  # Witness summaries at info are independent of this block.
  # log_witness:
  #   payload_sample_max_chars: 256
  #   force_payload_sample_at_debug: false

# chimera-broker: OpenAI-compatible LLM relay (chat, models, embeddings for RAG).
#
# The gateway sends provider traffic here (broker.base_url). Under chimera-supervisor this
# is usually a local wrapper; provider API keys live in the broker config, not here.
broker:
  # Base URL for chimera-broker (no trailing slash required).
  base_url: "http://127.0.0.1:8080"
  # Environment variable name for the Bearer token sent to chimera-broker.
  api_key_env: "CHIMERA_BROKER_API_KEY"
  # Log level for the chimera-broker wrapper subprocess (typical: info | debug).
  log_level: "info"
  # Bearer token for chimera-broker /v1/* when not using api_key_env.
  # When omitted and api_key_env is unset, a secret is generated on first start and written here.
  # api_key: ""

# chimera-vectorstore: vector database for semantic search (RAG collections).
#
# chimera-gateway reads and writes vectors at this HTTP URL when rag.enabled is true.
# Log level applies when chimera-supervisor runs the vectorstore wrapper with a storage child.
vectorstore:
  url: "http://127.0.0.1:6333"
  # Storage-backend log level when chimera-vectorstore supervises the child process.
  log_level: "info"
  # api_key: ""

# Timeouts and background checks against chimera-broker and related probes.
#
# Used for GET /health, catalog polling, and upstream chat completion deadlines.
health:
  # Timeout (ms) for chimera-broker health and GET /v1/models catalog fetch.
  timeout_ms: 5000
  # Timeout (ms) per chimera-broker POST /v1/chat/completions attempt.
  chat_timeout_ms: 30000
  # Period (ms) for chimera-broker GET /v1/models. 0 = disable polling.
  available_models_poll_ms: 30000
  # Optional explicit health probe URL (default: {broker.base_url}/health).
  # upstream_url: "http://127.0.0.1:8080/health"

# Paths to companion YAML files (relative to this file unless absolute).
#
# Reloaded when the file mtime changes (gateway.yaml also reloads when provider-free-tier changes).
paths:
  api_keys: "./api-keys.yaml"
  routing_policy: "./routing-policy.yaml"
  provider_free_tier: "./provider-free-tier.yaml"
  provider_model_limits: "./provider-model-limits.yaml"

# Virtual-model routing: which chimera-broker models to call and how to filter the catalog.
#
# Clients may request the Chimera-<semver> virtual id; the gateway maps that to fallback_chain
# models and optional tool-router slimming before the main completion.
routing:
  # When true, intersect GET /v1/models with provider_free_tier allowlist.
  filter_free_tier_models: true
  # Ordered chimera-broker model ids for virtual-model chat; try next on 429 / selected 5xx.
  fallback_chain:
    - "groq/llama-3.3-70b-versatile"
    - "gemini/gemini-2.5-flash"
    - "gemini/gemini-2.5-flash-lite"
    - "gemini/gemini-2.5-flash-preview-tts"
    - "gemini/gemini-3-flash-preview"
    - "gemini/gemini-3.1-flash-lite"
    - "gemini/gemini-3.1-flash-lite-preview"
    - "gemini/gemini-3.1-flash-live-preview"
    - "groq/openai/gpt-oss-120b"
    - "groq/qwen/qwen3-32b"
    - "groq/meta-llama/llama-4-scout-17b-16e-instruct"
    - "groq/openai/gpt-oss-20b"
    - "groq/llama-3.1-8b-instant"
    - "groq/allam-2-7b"
    - "groq/groq/compound"
    - "groq/groq/compound-mini"
    - "ollama/llama3.2:3b"
    - "ollama/qwen3.5:9b"
  # chimera-broker models for tool-router scoring before the main completion. Empty = disabled.
  router_models: []
  # - "ollama/llama3.2:3b"
  # - "groq/groq/compound-mini"
  tool_router:
    # Requires non-empty router_models.
    enabled: false
    # Keep tools with router score >= threshold (0–1).
    confidence_threshold: 0.5

# Gateway metrics: SQLite usage and chat outcomes for quotas and operator views.
#
# Applied at process start only (changing paths requires a restart). When enabled, supports
# provider_model_limits enforcement and conversation_merge embedding history.
metrics:
  enabled: true
  # sqlite_path: "../data/gateway/metrics.sqlite"
  # migrations_dir: "../migrations/chimera-gateway/metrics"

# Operator database: indexer workspaces (project/flavor paths and supervised state).
#
# Always opened at default paths unless you uncomment overrides below. Separate from metrics.sqlite.
# operator:
#   sqlite_path: "../data/gateway/operator.sqlite"
#   migrations_dir: "../migrations/chimera-gateway/operator"

# Operator logs UI: ring-buffer retention for supervised /ui/logs.
# operator_logs:
#   indexer_pinned_lines_max: 64  # reserve slots for run.start, scope.status, gate, skip summaries

# Conversation merge: reuse an existing chat session when the client omits a conversation id.
#
# Uses rag.embedding (when RAG is on) plus operator SQLite to match recent sessions by similarity.
# Optional sticky-attach fields link short follow-ups without a full embedding match.
conversation_merge:
  enabled: true
  # Minimum cosine similarity to attach to an existing session.
  match_threshold: 0.75
  # Only consider sessions updated within this many minutes.
  recent_window_minutes: 10
  # Max candidate sessions to score per request.
  candidate_limit: 32
  # Drop idle sessions after this many hours.
  max_idle_hours: 168
  # Sticky attach: link short follow-ups to the latest session within a time window.
  # session_attach_minutes: 45
  # session_attach_min_cosine: 0.18
  # session_short_follow_up_runes: 220

# chimera-indexer: file watcher that ingests workspace files into vectorstore via the gateway.
#
# When supervised.enabled is true, chimera-supervisor starts the indexer after chimera-broker is
# healthy. Set CHIMERA_GATEWAY_TOKEN in the environment for authenticated POST /v1/ingest.
# See docs/indexer.md.
indexer:
  supervised:
    # Start chimera-indexer after chimera-broker is healthy (needs CHIMERA_GATEWAY_TOKEN for ingest).
    enabled: true
    # By default, JSON logs on stderr are enabled. Set log_json: false to opt out.
    # log_json: false
    # The gateway can run the indexer provided at the given path.
    # bin: ""
    # When the gateway runs the indexer, it writes and reads its configuration from this file.
    # Created by `make chimera-indexer-configure` from config/indexer.example.yaml.
    config_path: "indexer.yaml"
    # When the gateway disables RAG it also disables the indexer.
    # With rag disabled, to run the indexer set this to true.
    # start_when_rag_disabled: false

# Retrieval-augmented generation ("RAG"): gateway behavior for knowledge-backed chat.
#
# When enabled, chimera-gateway can index text into vectorstore, search it at chat time,
# and inject matching snippets into requests to the virtual Chimera model (Chimera-<semver>).
# vectorstore.* above is where vectors are stored; this block controls embeddings, chunking,
# search limits, ingest size, and default project/flavor ids.
rag:
  # Master switch: ingest APIs, indexer APIs, chat-time retrieval, and vectorstore health checks.
  enabled: true
  # How text is turned into vectors (usually via chimera-broker /v1/embeddings).
  embedding:
    # Defaults to broker.base_url when empty.
    # base_url: ""
    path: "/v1/embeddings"
    model: "ollama/nomic-embed-text:latest"
    dim: 768
  # How documents are split before indexing.
  chunking:
    size: 512
    overlap: 128
  # How many chunks to fetch from vectorstore per chat request and minimum similarity.
  retrieval:
    top_k: 8
    score_threshold: 0.50
  # POST /v1/ingest and session ingest size limits.
  ingest:
    max_bytes: 10485760
    # max_whole_file_bytes: 2097152
  # Default X-Chimera-Project / X-Chimera-Flavor-Id when clients omit headers.
  defaults:
    project_id: "default"
    flavor_id: ""
