# chimera-indexer v0.4 example config (v0.2–v0.3 fields unchanged; v0.4 adds chunked ingest + sync state).
# Copy to .locus/indexer.config.yaml at the workspace root and edit.
# Sensitive values stay in the environment:
#   CHIMERA_GATEWAY_URL   (or set gateway_url below)
#   CHIMERA_GATEWAY_TOKEN (required; never put tokens in YAML for v0.2)

# Chimera Gateway base URL — must match `gateway.listen_port` in
# config/gateway.yaml (default 3000). NOT the BiFrost upstream port (8080).
gateway_url: "http://127.0.0.1:3000"

roots:
  - "."

# v0.3 — optional corpus scope (sent as X-Chimera-Project / X-Chimera-Flavor-Id).
# Use the same values as Continue chat (config.yaml) so RAG hits the same collection.
# defaults:
#   project_id: "my-app"
#   flavor_id: "default"
# roots:
#   - path: "./apps/web"
#     project_id: "web"
#   - path: "./legacy"
#     flavor_id: "legacy-corpus"
# overrides:
#   - glob: "**/*.md"
#     flavor_id: "docs"
# workspace_id: alias for project when project_id is omitted (maps to X-Chimera-Project).

# Extra ignore patterns (in addition to defaults + .chimeraignore + .gitignore).
ignore_extra:
  - "tmp/"
  - "*.snapshot"

# Failure-handling tunables (defaults shown).
retry_max_attempts: 5
retry_base_delay_ms: 500
retry_max_delay_ms: 30000
recovery_poll_interval_ms: 30000
# Also require GET /health (gateway readiness) before resuming after a pause.
# Set false to only poll GET /v1/indexer/storage/health.
# recovery_include_root_health: false

# Operational tunables (defaults shown).
debounce_ms: 750
workers: 4
queue_depth: 1024
# Fair-share bulk fan-out: fraction of queue_depth reserved across scopes (default 75 → p=0.75).
# queue_fanout_high_water_mark_percent: 75
max_file_bytes: 8388608
request_timeout_ms: 60000

# Live Qdrant point counts for logs / operators: poll GET /v1/indexer/storage/stats every N ms.
# Omit from YAML for ~2 minutes; set negative (e.g. -1) to disable periodic polls.
# storage_stats_poll_ms: 120000

# Per-scope live status for logging (indexer.scope.status / active_file).
# Omit for ~45s; set negative on scope_status_poll_ms to disable periodic scope status lines.
# scope_status_poll_ms: 45000
# scope_active_file_log_min_interval_ms: 2000

# v0.4 — optional (defaults: with --config, sync state next to that YAML e.g. data/gateway/indexer.sync-state.json;
# without --config, .locus/indexer.sync-state.json under cwd; whole-file limit from gateway only).
# sync_state_path: "data/gateway/indexer.sync-state.json"
# Max body size for single POST /v1/ingest. Files larger than this use the chunked
# ingest session API (when the gateway advertises it). Set below gateway max_ingest_bytes.
max_whole_file_bytes: 512000  # 500 KiB

# stderr minimum slog level for chimera-indexer (debug | info | warn | error). CLI --log-level overrides.
# log_level: info

# Per-file skip/upload verbosity: info | debug | off. Legacy verbose_job_logs (bool) maps when job_skip_log is unset.
# job_skip_log: info
